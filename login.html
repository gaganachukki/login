<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="left-section">
            <h1>Stackly Foodie</h1>
            <h2>Delicious food,<br>fast delivery<br>and more.</h2>
            <p>Order anytime. Fresh meals guaranteed.</p>
        </div>

        <div class="login-box">
            <h2>Sign In</h2>

            <form id="loginForm">

                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>

                <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="username" required />
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"
                    required />

                <button type="submit">Sign In</button>

                <div class="social-login">
                    <p>Or continue with</p>
                    <div class="social-icons">
                        <a href="404.html" class="social-icon"><i class="ri-google-fill"></i></a>
                        <a href="404.html" class="social-icon"><i class="ri-facebook-fill"></i></a>
                    </div>
                </div>

                <div class="options">
                    <label><input type="checkbox" /> Remember me</label>
                    <a href="404.html">Forgot Password?</a>
                </div>

                <p class="signup-text">
                    New to Stackly Foodie?
                    <a href="signin.html">Sign Up</a>
                </p>

            </form>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
